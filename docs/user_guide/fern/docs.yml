# yaml-language-server: $schema=https://schema.buildwithfern.dev/docs-yml.json

instances:
  - url: nvidia-holoscan.docs.buildwithfern.com/holoscan/sensor-bridge
    custom-domain: docs.nvidia.com/holoscan/sensor-bridge
    multi-source: true

global-theme: nvidia

ai-search:
  location:
    - docs

title: Holoscan Sensor Bridge Documentation

products:
  - display-name: Holoscan Sensor Bridge
    slug: /
    path: index.yml
    versions:
      - display-name: 2.6 (Latest)
        path: ./index.yml
        availability: ga
      - display-name: Archives
        path: ./versions/archives.yml

layout:
  searchbar-placement: header
  page-width: 1376px
  sidebar-width: 248px
  content-width: 812px
  tabs-placement: header
  hide-feedback: true

colors:
  accentPrimary:
    dark: '#76B900'
    light: '#76B900'
  background:
    light: '#FFFFFF'
    dark: '#000000'
typography:
  bodyFont:
    name: NVIDIA
    paths:
      - path: assets/fonts/NVIDIASans.woff2
        style: normal
      - path: assets/fonts/NVIDIASans_Italic.woff2
        style: italic
  codeFont:
    name: RobotoMono
    paths:
      - path: assets/fonts/RobotoMono.woff2
theme:
  page-actions: toolbar
  footer-nav: minimal

logo:
  dark: assets/NVIDIA_dark.svg
  light: assets/NVIDIA_light.svg
  height: 20
  href: /holoscan/sensor-bridge
  right-text: Documentation

favicon: assets/NVIDIA_symbol.svg

js:
  - url: https://assets.adobedtm.com/5d4962a43b79/c1061d2c5e7b/launch-191c2462b890.min.js
    strategy: beforeInteractive
  - path: dist/output.js
    strategy: afterInteractive
css:
  - assets/main.css
  - dist/output.css

redirects:
  - source: "/holoscan/sensor-bridge/index.html"
    destination: "/holoscan/sensor-bridge/getting-started/introduction"
  - source: "/holoscan/sensor-bridge/introduction"
    destination: "/holoscan/sensor-bridge/getting-started/introduction"
  - source: "/holoscan/sensor-bridge/introduction/introduction"
    destination: "/holoscan/sensor-bridge/getting-started/introduction"
